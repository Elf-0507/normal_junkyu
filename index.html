<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴웨스턴 학원</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f9f6ef; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 85vh; background-color: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background-color: rgba(249, 246, 239, 0.8); backdrop-filter: blur(10px); padding: 15px; text-align: center; font-size: 1.1rem; font-weight: 600; color: #1c1c1e; border-bottom: 1px solid #e5e5ea; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background-color: white; }
        .message { margin-bottom: 15px; max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .message.user { background-color: #007aff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .message.bot { background-color: #e5e5ea; color: #1c1c1e; margin-right: auto; border-bottom-left-radius: 4px; white-space: pre-line; }
        .chat-input-area { display: flex; padding: 15px; background-color: white; border-top: 1px solid #e5e5ea; }
        .chat-input { flex: 1; padding: 12px 15px; background-color: #f2f2f7; border: none; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .send-btn { background-color: transparent; color: #007aff; border: none; padding: 0 10px 0 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">뉴웨스턴 학원 멘토링</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">안녕하세요! 뉴웨스턴 학원 박준규 원장입니다. 무엇을 도와드릴까요?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="질문을 입력하세요..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">전송</button>
    </div>
</div>
<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;
        appendMessage(message, 'user');
        chatInput.value = '';
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            appendMessage(data.reply || "오류가 발생했습니다.", 'bot');
        } catch (error) {
            appendMessage("서버 연결에 실패했습니다.", 'bot');
        }
    }
</script>
</body>
</html>
